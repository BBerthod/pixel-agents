services:
  pixel-agents:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4242}:${PORT:-4242}"
    volumes:
      # Claude Code JSONL transcripts (read-only)
      - ${CLAUDE_DIR:-~/.claude}/projects:/home/bun/.claude/projects:ro
      # Persistent layout storage (read-write)
      - ${PIXEL_AGENTS_DIR:-~/.pixel-agents}:/home/bun/.pixel-agents
    env_file:
      - standalone/.env
